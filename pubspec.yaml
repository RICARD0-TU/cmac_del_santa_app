name: cmac_del_santa
description: "Aplicacion financiera mobile de CMAC Del Santa construida con Flutter, Clean Architecture y Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^7.0.0
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  easy_localization: ^3.0.8
  firebase_messaging: ^16.0.4
  fl_chart: ^1.1.1
  flutter_local_notifications: ^19.5.0
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.0.0-beta.4
  freezed_annotation: ^3.1.0
  go_router: ^17.0.0
  hive: ^2.2.3
  intl: ^0.20.2
  isar: ^3.1.0+1
  json_annotation: ^4.9.0
  jwt_decoder: ^2.0.1
  local_auth: ^3.0.0
  logger: ^2.6.2
  pdf: ^3.11.3
  pretty_dio_logger: ^1.4.0
  printing: ^5.14.2
  riverpod_annotation: ^3.0.3
  supabase_flutter: ^2.10.3
  talker: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.10.2
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
